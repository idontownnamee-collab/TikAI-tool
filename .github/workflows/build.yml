name: Build TikAI APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Setup real Gradle wrapper
        run: |
          echo "Downloading real Gradle 8.4..."
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle.zip
          gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          rm -rf gradle.zip gradle-8.4
          chmod +x gradlew
          echo "=== gradlew first line ==="
          head -2 gradlew

      - name: Generate drawable and icon assets
        run: python3 generate_assets.py

      - name: Add Markwon dependency
        run: |
          grep -q "markwon" app/build.gradle || \
          sed -i "s|implementation 'com.google.gson:gson:2.10.1'|implementation 'com.google.gson:gson:2.10.1'\n    implementation 'io.noties.markwon:core:4.6.2'|" app/build.gradle

      - name: Show project structure
        run: |
          echo "=== Project files ==="
          find . -name "*.kt" | head -20
          echo "=== app/build.gradle ==="
          cat app/build.gradle

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "=== Build finished, searching for APK ==="
          find . -name "*.apk" 2>/dev/null || echo "NO APK FOUND"

      - name: Copy APK to root
        run: |
          APK=$(find . -name "app-debug.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found!"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi
          cp "$APK" TikAI_Tool_v1.0.apk
          echo "APK size: $(ls -lh TikAI_Tool_v1.0.apk)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikAI-Tool-APK
          path: TikAI_Tool_v1.0.apk
          retention-days: 30
