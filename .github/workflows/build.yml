name: Build TikAI APK v2
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Gradle wrapper
        run: |
          curl -L -o g.zip https://services.gradle.org/distributions/gradle-7.5-bin.zip
          unzip -q g.zip
          gradle-7.5/bin/gradle wrapper --gradle-version 7.5
          rm -rf g.zip gradle-7.5
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Find APK
        run: |
          APK=$(find . -name "app-debug.apk" | head -1)
          cp "$APK" TikAI_v2.0.apk

      - uses: actions/upload-artifact@v4
        with:
          name: TikAI-v2-APK
          path: TikAI_v2.0.apk
          retention-days: 30
