name: Build TikAI APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Generate all missing files
        run: python3 generate_assets.py

      - name: Add Markwon dependency
        run: sed -i "s|implementation 'com.google.gson:gson:2.10.1'|implementation 'com.google.gson:gson:2.10.1'\n    implementation 'io.noties.markwon:core:4.6.2'|" app/build.gradle

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/TikAI_Tool_v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikAI-Tool-APK
          path: app/build/outputs/apk/debug/TikAI_Tool_v1.0.apk
          retention-days: 30
