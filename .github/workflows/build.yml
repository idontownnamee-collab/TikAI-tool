name: Build TikAI APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Setup Gradle wrapper
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle.zip
          gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          rm -rf gradle.zip gradle-8.4
          chmod +x gradlew

      - name: Fix gradle files and generate assets
        run: python3 generate_assets.py

      - name: Show fixed app/build.gradle
        run: cat app/build.gradle

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find and copy APK
        run: |
          APK=$(find . -name "app-debug.apk" | head -1)
          if [ -z "$APK" ]; then echo "APK not found!"; exit 1; fi
          cp "$APK" TikAI_Tool_v1.0.apk
          ls -lh TikAI_Tool_v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikAI-Tool-APK
          path: TikAI_Tool_v1.0.apk
          retention-days: 30
 
